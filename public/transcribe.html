<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Orbit Translator</title>

    <!-- Firebase SDK (v8 compat for straightforward vanilla JS integration) -->
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg: #0f0f0f;
            --bg-panel: #161616;
            --accent: #dca83a;
            --accent-rgb: 220, 168, 58;

            --txt: #f0f0f0;
            --txt-light: #ffffff;
            --stroke: #333333;
            --stroke2: #222222;
            --muted: #888888;
            --pill: #111111;

            --radius: 12px;
            --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--txt);
            font-family: var(--mono);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* --- TRANSLATOR PANEL --- */
        .sidebar {
            width: 100%;
            height: 100%;
            background: var(--bg-panel);
            border-left: none;
            display: flex;
            flex-direction: column;
            padding: 24px 20px;
            gap: 20px;
            box-shadow: -4px 0 30px rgba(0, 0, 0, 0.5);
            z-index: 100;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 0.05em;
            color: var(--txt-light);
            padding-bottom: 16px;
            border-bottom: 1px solid var(--stroke2);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header svg.logo-icon {
            width: 24px;
            height: 24px;
            color: var(--accent);
        }

        .history-btn {
            color: var(--muted);
            transition: color 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            text-decoration: none;
        }

        .history-btn:hover {
            color: var(--accent);
        }

        /* Vertical Controls */
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .row {
            display: flex;
            gap: 14px;
            width: 100%;
        }

        .row>* {
            flex: 1;
        }

        .lang-field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .lang-field label {
            font-size: 11px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        select,
        input[type="text"] {
            width: 100%;
            padding: 12px;
            background: var(--pill);
            border: 1px solid var(--stroke);
            border-radius: var(--radius);
            color: var(--txt);
            font-family: var(--mono);
            font-size: 13px;
            cursor: pointer;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"] {
            cursor: text;
        }

        input[readonly] {
            cursor: not-allowed;
            opacity: 0.6;
            background: #0a0a0a;
        }

        select:focus,
        input[type="text"]:focus:not([readonly]) {
            border-color: var(--accent);
        }

        /* Main Action Button */
        .action-btn {
            width: 100%;
            padding: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: var(--accent);
            border: 1px solid var(--accent);
            border-radius: var(--radius);
            color: #111111;
            font-family: var(--mono);
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 4px;
        }

        .action-btn:hover {
            background: #eac055;
            border-color: #eac055;
        }

        .action-btn.active {
            background: transparent;
            border-color: var(--accent);
            color: var(--accent);
            box-shadow: 0 0 15px rgba(var(--accent-rgb), 0.15);
        }

        /* Visualizer Bars */
        .viz-container {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            height: 18px;
            padding: 0 4px;
        }

        .viz-group {
            display: flex;
            align-items: flex-end;
            gap: 3px;
            height: 100%;
        }

        .viz-group label {
            font-size: 9px;
            color: var(--muted);
            margin-right: 8px;
            margin-bottom: 2px;
        }

        .orbBar {
            width: 4px;
            height: 4px;
            border-radius: 2px;
            transition: height 0.08s ease-out;
        }

        .viz-group.in .orbBar {
            background: var(--accent);
            box-shadow: 0 0 8px rgba(var(--accent-rgb), 0.4);
        }

        .viz-group.out .orbBar {
            background: var(--txt-light);
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.3);
        }

        /* Split Content Area */
        .split-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 14px;
            overflow: hidden;
        }

        .text-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--pill);
            border: 1px solid var(--stroke);
            border-radius: var(--radius);
            padding: 16px;
            overflow: hidden;
        }

        .panel-label {
            font-size: 10px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 10px;
            border-bottom: 1px solid var(--stroke2);
            padding-bottom: 8px;
            display: flex;
            justify-content: space-between;
        }

        .text-content {
            font-size: 14px;
            color: var(--txt-light);
            line-height: 1.6;
            word-break: break-word;
            flex: 1;
            overflow-y: auto;
            padding-right: 6px;
            white-space: pre-wrap;
        }

        .text-content::-webkit-scrollbar {
            width: 4px;
        }

        .text-content::-webkit-scrollbar-thumb {
            background: var(--stroke);
            border-radius: 4px;
        }

        .footer {
            border-top: 1px solid var(--stroke2);
            padding-top: 14px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .status-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            color: var(--muted);
        }

        .statusDot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(var(--accent-rgb), 0.2);
        }

        .statusDot.on {
            background: var(--accent);
            box-shadow: 0 0 8px rgba(var(--accent-rgb), 0.6);
        }

        .statusDot.err {
            background: #ff4d4d;
            box-shadow: 0 0 8px rgba(255, 77, 77, 0.5);
        }

        #debug {
            opacity: 0.7;
            font-size: 10px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--muted);
        }
    </style>
</head>

<body>

    <audio id="tts" autoplay></audio>

    <!-- Translation Panel -->
    <div class="sidebar">
        <div class="header">
            <div class="header-left">
                <svg class="logo-icon" viewBox="0 0 48 48" fill="none" aria-hidden="true">
                    <circle cx="20" cy="24" r="10" stroke="currentColor" stroke-width="2" />
                    <path d="M6 28c7-6 21-9 36-5" stroke="currentColor" stroke-width="2" opacity="0.7" />
                    <circle cx="36" cy="14" r="3" fill="currentColor" opacity="0.7" />
                </svg>
                Orbit Translator
            </div>
            <!-- History Button linking to history.html -->
            <a href="history.html" class="history-btn" title="View History">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <polyline points="12 6 12 12 16 14"></polyline>
                </svg>
            </a>
        </div>

        <div class="control-group">
            <!-- Firebase ID Fields -->
            <div class="row">
                <div class="lang-field">
                    <label>Room ID</label>
                    <input type="text" id="roomIdInput" value="General" placeholder="Room ID" title="Room ID"
                        aria-label="Room ID">
                </div>
                <div class="lang-field">
                    <label>User ID</label>
                    <input type="text" id="userIdInput" placeholder="User ID" title="User ID" aria-label="User ID"
                        readonly>
                </div>
            </div>

            <div class="row">
                <div class="lang-field">
                    <label>Translate From</label>
                    <select id="srcLang" title="Source Language" aria-label="Source Language"></select>
                </div>

                <div class="lang-field">
                    <label>Translate To</label>
                    <select id="tgtLang" title="Target Language" aria-label="Target Language"></select>
                </div>
            </div>

            <button id="toggleListenBtn" class="action-btn" type="button">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                    <path d="M4 5h7m-7 4h5m7-4h4m-4 0v14m0-14l-4 4m4-4l4 4" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round" />
                    <path d="M5 19h6m-6 0v-4m0 4l4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
                <span id="translatingLabel">Start Listening</span>
            </button>
        </div>

        <div class="viz-container">
            <div class="viz-group in" data-viz="in">
                <label>MIC</label>
                <div class="orbBar"></div>
                <div class="orbBar"></div>
                <div class="orbBar"></div>
                <div class="orbBar"></div>
            </div>
            <div class="viz-group out" data-viz="out">
                <label>TTS</label>
                <div class="orbBar"></div>
                <div class="orbBar"></div>
                <div class="orbBar"></div>
                <div class="orbBar"></div>
            </div>
        </div>

        <!-- SPLIT CONTENT VIEW -->
        <div class="split-content">

            <!-- Top Half: Transcription -->
            <div class="text-panel">
                <div class="panel-label">Original Transcription</div>
                <div id="originalText" class="text-content">Ready. Tap "Start Listening" to begin...</div>
            </div>

            <!-- Bottom Half: Translation -->
            <div class="text-panel">
                <div class="panel-label">Translation</div>
                <div id="translatedText" class="text-content">Translation will appear here...</div>
            </div>

        </div>

        <div class="footer">
            <div id="debug"></div>
            <div class="status-row">
                <span id="dot" class="statusDot"></span>
                <span id="status">Idle</span>
            </div>
        </div>
    </div>

    <script>
        /* =========================================================
           0. Firebase Initialization & Anonymous Auth
        ========================================================= */
        // For Firebase JS SDK v7.20.0 and later, measurementId is optional
        const firebaseConfig = {
            apiKey: "AIzaSyCTyfAh6mSuCoCixhW6tFRUJuyDU7PjSYQ",
            authDomain: "gen-lang-client-0986184485.firebaseapp.com",
            databaseURL: "https://gen-lang-client-0986184485-default-rtdb.firebaseio.com",
            projectId: "gen-lang-client-0986184485",
            storageBucket: "gen-lang-client-0986184485.firebasestorage.app",
            messagingSenderId: "73350400049",
            appId: "1:73350400049:web:5820bab6698f97f700ed10",
            measurementId: "G-FPVF5B1R07"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const auth = firebase.auth();

        // Perform Anonymous Sign-In to establish unique User ID
        auth.onAuthStateChanged((user) => {
            if (user) {
                // User is signed in, display uid
                document.getElementById("userIdInput").value = user.uid;
            } else {
                // Not signed in, sign in anonymously
                auth.signInAnonymously().catch((error) => {
                    console.error("Firebase Anonymous Auth Error:", error.code, error.message);
                    document.getElementById("userIdInput").value = "Auth Failed";
                });
            }
        });


        /* =========================================================
           1. Cartesia TTS Engine (Queue System)
        ========================================================= */
        const CARTESIA_CFG = {
            endpoint: "https://api.cartesia.ai/tts/bytes",
            apiKey: "sk_car_fpTpjmyBxqk8NznWPV8u2L",
            version: "2025-04-16",
            model: "sonic-3",
            voiceId: "9e8db62d-056f-47f3-b3b6-1b05767f9176"
        };

        const CARTESIA_LANGS = new Set([
            "en", "fr", "de", "es", "pt", "zh", "ja", "hi", "it", "ko", "nl", "pl", "ru", "sv", "tr", "tl",
            "bg", "ro", "ar", "cs", "el", "fi", "hr", "ms", "sk", "da", "ta", "uk", "hu", "no", "vi", "bn",
            "th", "he", "ka", "id", "te", "gu", "kn", "ml", "mr", "pa"
        ]);

        const ttsAudio = document.getElementById("tts");
        let ttsQueue = [];
        let ttsBusy = false;

        const DUCK_TARGET = 0.20;
        const DUCK_FADE_MS = 120;
        const RESTORE_FADE_MS = 160;
        let duckRefCount = 0;
        const duckStore = new Map();
        const duckAnim = new Map();

        function listOtherMediaEls() {
            return Array.from(document.querySelectorAll("audio,video")).filter(el => el && el !== ttsAudio);
        }

        function rampVolume(el, to, duration) {
            if (!el || typeof el.volume !== "number") return;
            const from = el.volume;
            const target = Math.max(0, Math.min(1, to));
            if (duckAnim.has(el)) cancelAnimationFrame(duckAnim.get(el));

            if (!isFinite(from) || duration <= 0 || Math.abs(from - target) < 0.001) {
                el.volume = target;
                return;
            }
            const start = performance.now();
            const tick = (now) => {
                const t = Math.min(1, (now - start) / duration);
                try { el.volume = from + (target - from) * (t * (2 - t)); } catch (_) { }
                if (t < 1) duckAnim.set(el, requestAnimationFrame(tick));
                else duckAnim.delete(el);
            };
            duckAnim.set(el, requestAnimationFrame(tick));
        }

        function duckOtherMedia() {
            if (++duckRefCount > 1) return;
            listOtherMediaEls().forEach(el => {
                try {
                    if (!duckStore.has(el)) duckStore.set(el, { vol: el.volume ?? 1, muted: !!el.muted });
                    if (!el.muted) rampVolume(el, Math.min(DUCK_TARGET, el.volume ?? 1), DUCK_FADE_MS);
                } catch (_) { }
            });
        }

        function restoreOtherMedia() {
            duckRefCount = Math.max(0, duckRefCount - 1);
            if (duckRefCount !== 0) return;
            for (const [el, st] of duckStore.entries()) {
                try {
                    el.muted = st.muted;
                    if (!el.muted && typeof st.vol === "number") rampVolume(el, st.vol, RESTORE_FADE_MS);
                } catch (_) { }
            }
            duckStore.clear();
        }

        async function unlockAudioOnce() {
            try {
                const AC = window.AudioContext || window.webkitAudioContext;
                if (AC) {
                    const ctx = new AC(); await ctx.resume();
                    const osc = ctx.createOscillator(); const gain = ctx.createGain();
                    gain.gain.value = 0.0001; osc.connect(gain); gain.connect(ctx.destination);
                    osc.start(); osc.stop(ctx.currentTime + 0.1);
                }
                startBackgroundLoop();
            } catch (_) { }
        }

        let bgInterval = null;
        function startBackgroundLoop() {
            if (bgInterval) return;
            bgInterval = setInterval(async () => {
                if (!listening && ttsQueue.length === 0) return;
                try {
                    const AC = window.AudioContext || window.webkitAudioContext;
                    if (AC) {
                        const ctx = new AC(); await ctx.resume();
                        const osc = ctx.createOscillator(); const gain = ctx.createGain();
                        gain.gain.value = 0.00001; osc.connect(gain); gain.connect(ctx.destination);
                        osc.start(); osc.stop(ctx.currentTime + 0.01);
                    }
                } catch (_) { }
            }, 15000);
        }

        function normalizeSpaces(s) { return (s || "").replace(/\s+/g, " ").trim(); }
        function baseLang(code) { return String(code || "").trim().replace(/_/g, "-").split("-")[0]; }

        function splitSpeakSegments(text) {
            const t = normalizeSpaces(text);
            if (!t) return [];
            const segments = [];
            const sentences = t.split(/([.!?…]+\s*)/);
            let currentSegment = "";

            for (let i = 0; i < sentences.length; i++) {
                const part = sentences[i].trim();
                if (!part) continue;

                if (/^[.!?…]+$/.test(part)) {
                    currentSegment += part;
                    continue;
                }

                const testSegment = currentSegment + part;
                if (testSegment.length > 200) {
                    const clauses = splitByClauses(testSegment);
                    if (clauses.length > 1) {
                        for (let j = 0; j < clauses.length - 1; j++) {
                            const clause = clauses[j].trim();
                            if (clause && clause.length > 10) segments.push(clause);
                        }
                        currentSegment = clauses[clauses.length - 1];
                    } else {
                        const chunks = splitByLength(testSegment, 180);
                        if (chunks.length > 1) {
                            segments.push(...chunks.slice(0, -1));
                            currentSegment = chunks[chunks.length - 1];
                        } else {
                            currentSegment = testSegment;
                        }
                    }
                } else {
                    currentSegment = testSegment;
                }

                if (/[.!?…]$/.test(currentSegment) && currentSegment.length > 10) {
                    segments.push(currentSegment.trim());
                    currentSegment = "";
                }
            }
            if (currentSegment.trim() && currentSegment.trim().length > 5) segments.push(currentSegment.trim());
            return segments.filter(s => s && s.length > 3);
        }

        function splitByClauses(text) {
            const clauseSeparators = /[;:|，|。|！|？|;|:]/;
            const commaSeparators = /[,，]/;
            let parts = text.split(clauseSeparators);
            if (parts.length === 1 && text.length > 150) parts = text.split(commaSeparators);
            return parts.map(p => p.trim()).filter(p => p.length > 0);
        }

        function splitByLength(text, maxLength) {
            const chunks = [];
            let current = "";
            const words = text.split(/\s+/);
            for (const word of words) {
                const test = current + (current ? " " : "") + word;
                if (test.length <= maxLength) current = test;
                else {
                    if (current) chunks.push(current);
                    current = word;
                }
            }
            if (current) chunks.push(current);
            return chunks;
        }

        function enqueueTTS(text, langCode, emotion = null) {
            const segments = splitSpeakSegments(text);
            const targetEmotion = emotion || currentEmotion;
            segments.forEach(s => {
                ttsQueue.push({ text: s, lang: langCode, emotion: targetEmotion, timestamp: Date.now() });
            });
            processTTSQueue().catch(() => { });
        }

        async function cartesiaBytes(transcript, langCode, emotion = "content") {
            let bLang = baseLang(langCode) || 'en';
            if (!CARTESIA_LANGS.has(bLang)) bLang = 'en';

            const emotionMap = {
                'happy': 'happy', 'sad': 'sad', 'angry': 'angry', 'excited': 'excited',
                'gentle': 'gentle', 'curious': 'curious', 'content': 'content'
            };
            const mappedEmotion = emotionMap[emotion] || 'content';
            const emotionParams = getEmotionVoiceParams(mappedEmotion);

            const res = await fetch(CARTESIA_CFG.endpoint, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "X-API-Key": CARTESIA_CFG.apiKey,
                    "Cartesia-Version": CARTESIA_CFG.version
                },
                body: JSON.stringify({
                    model_id: CARTESIA_CFG.model,
                    transcript: transcript,
                    language: bLang,
                    voice: { mode: "id", id: CARTESIA_CFG.voiceId },
                    output_format: { container: "wav", encoding: "pcm_f32le", sample_rate: 44100 },
                    speed: emotionParams.speed,
                    generation_config: {
                        speed: emotionParams.speed,
                        volume: emotionParams.volume,
                        emotion: mappedEmotion,
                        pitch: emotionParams.pitch,
                        prosody_speed: emotionParams.prosodySpeed
                    }
                })
            });

            if (!res.ok) throw new Error(`Cartesia HTTP ${res.status}: ${await res.text()}`);
            return await res.blob();
        }

        function getEmotionVoiceParams(emotion) {
            const params = {
                'happy': { speed: 1.1, volume: 1.2, pitch: 1.1, prosodySpeed: 1.15 },
                'sad': { speed: 0.85, volume: 0.8, pitch: 0.85, prosodySpeed: 0.9 },
                'angry': { speed: 1.2, volume: 1.3, pitch: 1.2, prosodySpeed: 1.25 },
                'excited': { speed: 1.3, volume: 1.4, pitch: 1.3, prosodySpeed: 1.35 },
                'gentle': { speed: 0.9, volume: 0.85, pitch: 0.95, prosodySpeed: 0.95 },
                'curious': { speed: 1.05, volume: 1.1, pitch: 1.15, prosodySpeed: 1.1 },
                'content': { speed: 1.0, volume: 1.0, pitch: 1.0, prosodySpeed: 1.0 }
            };
            return params[emotion] || params['content'];
        }

        async function setAndPlayBlob(blob) {
            return new Promise((resolve) => {
                const url = URL.createObjectURL(blob);
                let done = false;
                ensureOutputAnalyser();
                if (outputCtx && outputCtx.state === "suspended") outputCtx.resume().catch(() => { });

                const cleanup = () => { ttsAudio.removeEventListener("error", onErr); ttsAudio.removeEventListener("canplaythrough", onCanPlay); };
                const onErr = () => { if (done) return; done = true; cleanup(); resolve(false); };
                const onCanPlay = async () => {
                    if (done) return;
                    try { await ttsAudio.play(); done = true; cleanup(); resolve(true); }
                    catch { done = true; cleanup(); resolve(false); }
                };

                ttsAudio.addEventListener("error", onErr, { once: true });
                ttsAudio.addEventListener("canplaythrough", onCanPlay, { once: true });
                ttsAudio.src = url;

                setTimeout(() => { if (!done) { done = true; cleanup(); resolve(ttsAudio.readyState >= 2); } }, 2000);
            });
        }

        function waitForEnded() {
            return new Promise(resolve => {
                ttsAudio.addEventListener("ended", () => resolve(), { once: true });
                setTimeout(() => { if (ttsAudio.paused) resolve(); }, (ttsAudio.duration * 1000) + 1000 || 2000);
            });
        }

        async function speakText(text, langCode, emotion = "content") {
            duckOtherMedia();
            try {
                const blob = await cartesiaBytes(text, langCode, emotion);
                if (!(await setAndPlayBlob(blob))) throw new Error("Audio decode failed.");
                await waitForEnded();
            } finally {
                restoreOtherMedia();
            }
        }

        async function processTTSQueue() {
            if (ttsBusy) return;
            ttsBusy = true;

            while (ttsQueue.length > 0) {
                const next = ttsQueue.shift();
                try {
                    setStatus("Speaking…", "on");
                    const emotion = next.emotion || currentEmotion;
                    await speakText(next.text, next.lang, emotion);

                    const pauseDuration = calculatePauseDuration(next.text, emotion);
                    await new Promise(r => setTimeout(r, pauseDuration));
                } catch (e) {
                    ui.debug.textContent = "TTS Err: " + (e?.message || e);
                    await new Promise(r => setTimeout(r, 500));
                }
            }
            ttsBusy = false;
            setStatus(listening ? "Listening…" : "Idle", listening ? "on" : "idle");
        }

            if (!frequencyData || frequencyData.length === 0) return "content";
            const features = extractAudioFeatures(frequencyData);
            if (features.energy > 0.7 && features.pitch > 0.6) return features.spectralCentroid > 0.7 ? "excited" : "happy";
            else if (features.energy > 0.5 && features.pitch < 0.4) return "sad";
            else if (features.energy > 0.6 && features.spectralCentroid < 0.4) return "angry";
            else if (features.energy < 0.3 && features.pitch > 0.5) return "gentle";
            else if (features.energy > 0.4 && features.pitchVariability > 0.6) return "curious";
            return "content";

        function extractAudioFeatures(frequencyData) {
            const energy = frequencyData.reduce((sum, val) => sum + Math.abs(val), 0) / frequencyData.length;
            const pitch = estimatePitch(frequencyData);
            const spectralCentroid = calculateSpectralCentroid(frequencyData);
            const pitchVariability = calculatePitchVariability(frequencyData);
            return {
                energy: Math.min(1, energy * 10),
                pitch: Math.min(1, pitch / 500),
                spectralCentroid: Math.min(1, spectralCentroid / frequencyData.length),
                pitchVariability: Math.min(1, pitchVariability)
            };
        }

        function estimatePitch(frequencyData) {
            let crossings = 0;
            for (let i = 1; i < frequencyData.length; i++) if ((frequencyData[i - 1] >= 0) !== (frequencyData[i] >= 0)) crossings++;
            return (crossings / 2) * (44100 / frequencyData.length);
        }

        function calculateSpectralCentroid(frequencyData) {
            let weightedSum = 0, magnitudeSum = 0;
            for (let i = 0; i < frequencyData.length; i++) {
                const magnitude = Math.abs(frequencyData[i]);
                weightedSum += i * magnitude;
                magnitudeSum += magnitude;
            }
            return magnitudeSum > 0 ? weightedSum / magnitudeSum : 0;
        }

        function calculatePitchVariability(frequencyData) {
            const mean = frequencyData.reduce((sum, val) => sum + Math.abs(val), 0) / frequencyData.length;
            const variance = frequencyData.reduce((sum, val) => {
                const diff = Math.abs(val) - mean;
                return sum + diff * diff;
            }, 0) / frequencyData.length;
            return Math.sqrt(variance);
        }

            const b = baseLang(code);
            return CARTESIA_LANGS.has(b) ? b : "";
        }

        function escapeHtml(s) {
            return String(s ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
        }

        function populateLangs() {
            const opts = [];
            for (const [id, label, translate, speech, cartesia] of VARIANTS) {
                opts.push(`<option value="${escapeHtml(id)}" data-translate="${escapeHtml(translate)}" data-speech="${escapeHtml(speech)}" data-cartesia="${escapeHtml(cartesia || "")}">${escapeHtml(label)}</option>`);
            }
            const basePairs = Object.entries(BASE_LANGS).sort((a, b) => a[1].localeCompare(b[1]));
            for (const [code, name] of basePairs) {
                if (!code) continue;
                opts.push(`<option value="${escapeHtml(code)}" data-translate="${escapeHtml(code)}" data-speech="${escapeHtml(defaultSpeechForTranslate(code))}" data-cartesia="${escapeHtml(defaultCartesiaForTranslate(code))}">${escapeHtml(name)} (${escapeHtml(code)})</option>`);
            }
            ui.srcLang.innerHTML = ui.tgtLang.innerHTML = opts.join("");
            ui.srcLang.value = "en-US";
            ui.tgtLang.value = "sv";
        }

        function getLangMeta(selectEl) {
            const opt = selectEl.selectedOptions && selectEl.selectedOptions[0];
            const value = selectEl.value || "en-US";
            const translate = (opt && opt.dataset && opt.dataset.translate) ? opt.dataset.translate : value;
            const speech = (opt && opt.dataset && opt.dataset.speech) ? opt.dataset.speech : defaultSpeechForTranslate(value);
            const cartesia = (opt && opt.dataset && opt.dataset.cartesia) ? opt.dataset.cartesia : defaultCartesiaForTranslate(value);
            return { value, translate, speech, cartesia };
        }

        populateLangs();
        setStatus("Idle");
        startOrbVisualizer();
    </script>
</body>
