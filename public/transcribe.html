<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Orbit Translator</title>
    <style>
        :root {
            --bg: #0f0f0f;
            --bg-panel: #161616;
            --accent: #dca83a;
            --accent-rgb: 220, 168, 58;
            --txt: #f0f0f0;
            --txt-light: #ffffff;
            --stroke: #333333;
            --stroke2: #222222;
            --muted: #888888;
            --pill: #111111;
            --danger: #ff4d4d;
            --radius: 8px;
            --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            background: var(--bg);
            color: var(--txt);
            font-family: var(--mono);
            height: 100%;
            overflow: hidden;
        }

        body { display: flex; }

        .sidebar {
            width: 100%;
            height: 100%;
            background: var(--bg-panel);
            display: flex;
            flex-direction: column;
            padding: 12px 16px;
            gap: 12px;
            box-shadow: -4px 0 30px rgba(0, 0, 0, 0.5);
            z-index: 100;
            min-height: 0;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 0.05em;
            color: var(--txt-light);
            padding-bottom: 8px;
            border-bottom: 1px solid var(--stroke2);
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
        }

        .header svg.logo-icon {
            width: 20px;
            height: 20px;
            color: var(--accent);
            flex-shrink: 0;
        }

        .header-tabs {
            display: flex;
            gap: 2px;
            background: var(--pill);
            padding: 2px;
            border-radius: 8px;
            border: 1px solid var(--stroke);
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: var(--muted);
            font-family: var(--mono);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            padding: 4px 10px;
            border-radius: 6px;
            transition: all 0.2s;
            font-weight: bold;
        }

        .tab-btn:hover { color: var(--txt-light); }
        .tab-btn.active { color: #111; background: var(--accent); }

        .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .toggle-icon-btn,
        .history-btn {
            color: var(--muted);
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            text-decoration: none;
            width: 32px;
            height: 32px;
            border: 1px solid var(--stroke);
            border-radius: 8px;
            background: var(--pill);
            padding: 0;
        }

        .toggle-icon-btn:hover,
        .history-btn:hover {
            color: var(--accent);
            border-color: rgba(var(--accent-rgb), 0.45);
        }

        .toggle-icon-btn.active {
            color: var(--accent);
            border-color: rgba(var(--accent-rgb), 0.55);
            box-shadow: 0 0 0 1px rgba(var(--accent-rgb), 0.18), 0 0 18px rgba(var(--accent-rgb), 0.08);
        }

        .toggle-icon-btn.off {
            color: var(--danger);
            border-color: rgba(255, 77, 77, 0.35);
        }

        .toggle-icon-btn svg,
        .history-btn svg { width: 16px; height: 16px; }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex-shrink: 0;
        }

        .row { display: flex; gap: 8px; width: 100%; }
        .row>* { flex: 1; min-width: 0; }
        
        .controls-row {
            display: flex;
            gap: 8px;
            align-items: flex-end;
            width: 100%;
        }

        .lang-field { display: flex; flex-direction: column; gap: 4px; }
        .lang-field label {
            font-size: 9px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            width: 100%;
        }

        select, input[type="text"] {
            width: 100%;
            padding: 8px 10px;
            background: var(--pill);
            border: 1px solid var(--stroke);
            border-radius: var(--radius);
            color: var(--txt);
            font-family: var(--mono);
            font-size: 11px;
            cursor: pointer;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-wrapper input[type="text"] {
            padding-right: 32px;
        }

        .gen-btn {
            position: absolute;
            right: 4px;
            background: transparent;
            border: none;
            color: var(--muted);
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .gen-btn:hover {
            color: var(--accent);
            background: rgba(255,255,255,0.05);
        }

        .gen-btn svg {
            width: 14px;
            height: 14px;
        }

        input[type="text"] { cursor: text; }
        input[readonly] { cursor: not-allowed; opacity: 0.6; background: #0a0a0a; }
        select:focus, input[type="text"]:focus:not([readonly]) { border-color: var(--accent); }

        .action-btn {
            width: 100%;
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            background: var(--accent);
            border: 1px solid var(--accent);
            border-radius: var(--radius);
            color: #111111;
            font-family: var(--mono);
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .action-btn:hover { background: #eac055; border-color: #eac055; }
        .action-btn.active {
            background: transparent;
            border-color: var(--accent);
            color: var(--accent);
            box-shadow: 0 0 15px rgba(var(--accent-rgb), 0.15);
        }

        #speakBtn, #listenTranslationBtn {
            width: auto;
            padding: 0 16px;
            height: 31px;
            margin: 0;
            flex-shrink: 0;
            min-width: 140px;
        }

        .viz-container {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            height: 14px;
            padding: 0 4px;
            flex-shrink: 0;
        }

        .viz-group { display: flex; align-items: flex-end; gap: 2px; height: 100%; }
        .viz-group label {
            font-size: 8px;
            color: var(--muted);
            margin-right: 6px;
            margin-bottom: 2px;
        }

        .orbBar { width: 4px; height: 4px; border-radius: 2px; transition: height 0.08s ease-out; }
        .viz-group.in .orbBar { background: var(--accent); box-shadow: 0 0 8px rgba(var(--accent-rgb), 0.4); }
        .viz-group.out .orbBar { background: var(--txt-light); box-shadow: 0 0 8px rgba(255, 255, 255, 0.3); }

        .main-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--pill);
            border: 1px solid var(--stroke);
            border-radius: var(--radius);
            padding: 12px;
            overflow: hidden;
            min-height: 0;
        }

        .text-content {
            display: none; 
            flex-direction: column;
            font-size: 13px;
            color: var(--txt-light);
            line-height: 1.65;
            word-break: break-word;
            overflow-y: auto;
            padding-right: 6px;
            white-space: normal;
            min-height: 0;
            flex: 1;
        }

        .text-content.active { display: flex; }
        .text-content::-webkit-scrollbar { width: 6px; }
        .text-content::-webkit-scrollbar-thumb { background: #3a3a3a; border-radius: 999px; }

        .entry {
            display: block;
            margin-bottom: 8px;
            padding: 10px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: var(--radius);
            background: rgba(255, 255, 255, 0.02);
        }
        .entry:last-child { margin-bottom: 0; }
        .entry-self {
            border-color: rgba(var(--accent-rgb), 0.35);
            background: rgba(var(--accent-rgb), 0.08);
        }

        .entry-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 6px;
            font-size: 10px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .entry-user {
            color: var(--accent);
            font-weight: 700;
            max-width: 70%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .entry-time { flex-shrink: 0; opacity: 0.8; }
        .entry-body {
            color: var(--txt-light);
            font-size: 13px;
            line-height: 1.7;
            white-space: pre-wrap;
            word-break: break-word;
            overflow-wrap: anywhere;
        }

        .entry-empty { color: var(--muted); opacity: 0.9; padding: 8px 2px; text-align: center; margin-top: 20px;}
        .entry-translating { opacity: 0.6; font-style: italic; }

        .live-line {
            display: block;
            margin-top: 8px;
            padding: 10px;
            border: 1px dashed rgba(var(--accent-rgb), 0.35);
            border-radius: var(--radius);
            background: rgba(var(--accent-rgb), 0.06);
            color: #fff4cf;
            white-space: pre-wrap;
            word-break: break-word;
            overflow-wrap: anywhere;
        }

        .footer {
            border-top: 1px solid var(--stroke2);
            padding-top: 8px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex-shrink: 0;
        }

        .status-row { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--muted); }
        .statusDot { width: 8px; height: 8px; border-radius: 50%; background: rgba(var(--accent-rgb), 0.2); }
        .statusDot.on { background: var(--accent); box-shadow: 0 0 8px rgba(var(--accent-rgb), 0.6); }
        .statusDot.err { background: #ff4d4d; box-shadow: 0 0 8px rgba(255, 77, 77, 0.5); }
        #debug { opacity: 0.7; font-size: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--muted); }

        @media (max-width: 680px) {
            .header-left { flex-direction: column; align-items: flex-start; gap: 8px; }
            .header-right { gap: 8px; }
            .row { flex-direction: column; }
            .controls-row { flex-direction: column; align-items: stretch; }
            #speakBtn, #listenTranslationBtn { width: 100%; min-width: auto; }
            .entry-head { flex-direction: column; align-items: flex-start; }
            .entry-user { max-width: 100%; }
        }
    </style>
</head>

<body>

    <audio id="tts" autoplay></audio>

    <div class="sidebar">
        <div class="header">
            <div class="header-left">
                <svg class="logo-icon" viewBox="0 0 48 48" fill="none" aria-hidden="true">
                    <circle cx="20" cy="24" r="10" stroke="currentColor" stroke-width="2" />
                    <path d="M6 28c7-6 21-9 36-5" stroke="currentColor" stroke-width="2" opacity="0.7" />
                    <circle cx="36" cy="14" r="3" fill="currentColor" opacity="0.7" />
                </svg>
                <div class="header-tabs">
                    <button class="tab-btn active" data-target="transcription">Transcription</button>
                    <button class="tab-btn" data-target="translation">Translation</button>
                </div>
            </div>

            <div class="header-right" id="transcription-icons">
                <a href="history.html" class="history-btn" title="View History">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <polyline points="12 6 12 12 16 14"></polyline>
                    </svg>
                </a>
            </div>

            <div class="header-right" id="translation-icons" style="display: none;">
                <button id="muteTtsBtn" class="toggle-icon-btn off" type="button" title="TTS Muted">
                    <svg id="muteTtsIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                        <line x1="23" y1="9" x2="17" y2="15"></line>
                        <line x1="17" y1="9" x2="23" y2="15"></line>
                    </svg>
                </button>
                <a href="history.html" class="history-btn" title="View History">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <polyline points="12 6 12 12 16 14"></polyline>
                    </svg>
                </a>
            </div>
        </div>

        <div class="control-group">
            <div class="row">
                <div class="lang-field">
                    <label>Room ID</label>
                    <div class="input-wrapper">
                        <input type="text" id="roomIdInput" placeholder="Enter ID">
                        <button id="generateRoomBtn" class="gen-btn" type="button" title="Generate New ID">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="23 4 23 10 17 10"></polyline>
                                <polyline points="1 20 1 14 7 14"></polyline>
                                <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="lang-field">
                    <label>User ID</label>
                    <input type="text" id="userIdInput" placeholder="Authenticating..." readonly>
                </div>
            </div>

            <div id="transcription-controls" class="controls-row">
                <div class="lang-field" style="flex: 1;">
                    <label>Spoken Language</label>
                    <select id="srcLang"></select>
                </div>
                <button id="speakBtn" class="action-btn" type="button">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                        <line x1="12" y1="19" x2="12" y2="22"></line>
                    </svg>
                    <span>Speak</span>
                </button>
            </div>

            <div id="translation-controls" class="controls-row" style="display: none;">
                <div class="lang-field" style="flex: 1;">
                    <label>Translate To</label>
                    <select id="tgtLang"></select>
                </div>
                <button id="listenTranslationBtn" class="action-btn" type="button">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 18v-6a9 9 0 0 1 18 0v6"></path>
                        <path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"></path>
                    </svg>
                    <span>Listen</span>
                </button>
            </div>
        </div>

        <div class="viz-container">
            <div class="viz-group in" data-viz="in">
                <label>MIC</label>
                <div class="orbBar"></div>
                <div class="orbBar"></div>
                <div class="orbBar"></div>
                <div class="orbBar"></div>
            </div>
            <div class="viz-group out" data-viz="out">
                <label>TTS</label>
                <div class="orbBar"></div>
                <div class="orbBar"></div>
                <div class="orbBar"></div>
                <div class="orbBar"></div>
            </div>
        </div>

        <div class="main-panel">
            <div id="originalText" class="text-content active"></div>
            <div id="translatedText" class="text-content"></div>
        </div>

        <div class="footer">
            <div id="debug"></div>
            <div class="status-row">
                <span id="dot" class="statusDot"></span>
                <span id="status">Initializing...</span>
            </div>
        </div>
    </div>

    <script>
    (function() {
        const _d = (s) => atob(s);
        const _r = (s) => atob(s.split('').reverse().join(''));

        let database, auth;
        let _cUID = "";
        let _cRLR = null;
        let _rM =[];
        let _sKeys = new Set();
        let interimText = "";
        let _cRN = ""; 

        async function _initSys() {
            const _u =[
                'aHR0cHM6Ly93d3cuZ3N0YXRpYy5jb20vZmlyZWJhc2Vqcy8xMC45LjAvZmlyZWJhc2UtYXBwLWNvbXBhdC5qcw==',
                'aHR0cHM6Ly93d3cuZ3N0YXRpYy5jb20vZmlyZWJhc2Vqcy8xMC45LjAvZmlyZWJhc2UtYXV0aC1jb21wYXQuanM=',
                'aHR0cHM6Ly93d3cuZ3N0YXRpYy5jb20vZmlyZWJhc2Vqcy8xMC45LjAvZmlyZWJhc2UtZGF0YWJhc2UtY29tcGF0Lmpz'
            ];
            for (let x of _u) {
                await new Promise(r => {
                    const s = document.createElement('script');
                    s.src = _d(x);
                    s.onload = r;
                    document.head.appendChild(s);
                });
            }
            _bootApp();
        }

        function _bootApp() {
            const _fc = JSON.parse(_d('eyJhcGlLZXkiOiJBSXphU3lDVHlmQWg2bVN1Q29DaXhoVzZ0RlJVSnV5RFU3UGpTWVEiLCJhdXRoRG9tYWluIjoiZ2VuLWxhbmctY2xpZW50LTA5ODYxODQ0ODUuZmlyZWJhc2VhcHAuY29tIiwiZGF0YWJhc2VVUkwiOiJodHRwczovL2dlbi1sYW5nLWNsaWVudC0wOTg2MTg0NDg1LWRlZmF1bHQtcnRkYi5maXJlYmFzZWlvLmNvbSIsInByb2plY3RJZCI6Imdlbi1sYW5nLWNsaWVudC0wOTg2MTg0NDg1Iiwic3RvcmFnZUJ1Y2tldCI6Imdlbi1sYW5nLWNsaWVudC0wOTg2MTg0NDg1LmZpcmViYXNlc3RvcmFnZS5hcHAiLCJtZXNzYWdpbmdTZW5kZXJJZCI6IjczMzUwNDAwMDQ5IiwiYXBwSWQiOiIxOjczMzUwNDAwMDQ5OndlYjo1ODIwYmFiNjY5OGY5N2Y3MDBlZDEwIiwibWVhc3VyZW1lbnRJZCI6IkctRlBWRjVCMVIwNyJ9'));
            firebase.initializeApp(_fc);
            database = firebase.database();
            auth = firebase.auth();

            auth.onAuthStateChanged((user) => {
                if (user) {
                    _cUID = user.uid;
                    document.getElementById("userIdInput").value = user.uid;
                    renderRoomTranscripts(); 
                } else {
                    auth.signInAnonymously().catch((err) => {
                        document.getElementById("userIdInput").value = "Auth Failed";
                        setStatus("Auth failed", "err");
                    });
                }
            });

            setStatus("Idle");
            startOrbVisualizer();
        }

        const ui = {
            originalText: document.getElementById("originalText"),
            translatedText: document.getElementById("translatedText"),
            status: document.getElementById("status"),
            debug: document.getElementById("debug"),
            dot: document.getElementById("dot"),
            speakBtn: document.getElementById("speakBtn"),
            srcLang: document.getElementById("srcLang"),
            tgtLang: document.getElementById("tgtLang"),
            roomIdInput: document.getElementById("roomIdInput"),
            generateRoomBtn: document.getElementById("generateRoomBtn"),
            userIdInput: document.getElementById("userIdInput"),
            muteTtsBtn: document.getElementById("muteTtsBtn"),
            muteTtsIcon: document.getElementById("muteTtsIcon"),
            listenTranslationBtn: document.getElementById("listenTranslationBtn"),
            transcriptionIcons: document.getElementById("transcription-icons"),
            translationIcons: document.getElementById("translation-icons"),
            transcriptionControls: document.getElementById("transcription-controls"),
            translationControls: document.getElementById("translation-controls")
        };

        const playbackPrefs = { ttsMuted: true, isTranslating: false, skipOwnPlayback: false };

        const tabBtns = document.querySelectorAll('.tab-btn');
        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                tabBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                const targetId = btn.getAttribute('data-target');
                if (targetId === 'transcription') {
                    ui.transcriptionIcons.style.display = 'flex';
                    ui.translationIcons.style.display = 'none';
                    ui.transcriptionControls.style.display = 'flex';
                    ui.translationControls.style.display = 'none';
                    ui.originalText.classList.add('active');
                    ui.translatedText.classList.remove('active');
                    ui.originalText.scrollTop = ui.originalText.scrollHeight;
                } else {
                    ui.transcriptionIcons.style.display = 'none';
                    ui.translationIcons.style.display = 'flex';
                    ui.transcriptionControls.style.display = 'none';
                    ui.translationControls.style.display = 'flex';
                    ui.originalText.classList.remove('active');
                    ui.translatedText.classList.add('active');
                    ui.translatedText.scrollTop = ui.translatedText.scrollHeight;
                }
            });
        });

        ui.generateRoomBtn.addEventListener("click", () => {
            ui.roomIdInput.value = Math.random().toString(36).substring(2, 8).toUpperCase();
            subscribeToRoom();
        });

        ui.listenTranslationBtn.addEventListener('click', async () => {
            playbackPrefs.isTranslating = !playbackPrefs.isTranslating;
            
            if (playbackPrefs.isTranslating) {
                ui.listenTranslationBtn.classList.add('active');
                ui.listenTranslationBtn.querySelector('span').textContent = "Stop Listening";
                
                playbackPrefs.ttsMuted = false;
                updateHeaderToggles();
                await unlockAudioOnce();
                
                await backfillTranslations();
            } else {
                ui.listenTranslationBtn.classList.remove('active');
                ui.listenTranslationBtn.querySelector('span').textContent = "Listen";
                
                playbackPrefs.ttsMuted = true;
                updateHeaderToggles();
                ttsQueue =[];
                try { ttsAudio.pause(); } catch (_) {}
                ttsBusy = false;
                renderRoomTranscripts();
            }
        });

        async function backfillTranslations() {
            const tgt = getLangMeta(ui.tgtLang);
            const fromVal = 'auto'; 
            
            for (let msg of _rM) {
                if (!msg.translatedText || msg.translatedText === "...") {
                    msg.translatedText = await _pT(msg.originalText, fromVal, tgt.translate);
                }
            }
            renderRoomTranscripts();
        }

        const retranslateIfActive = () => {
            if (playbackPrefs.isTranslating) {
                _rM.forEach(m => m.translatedText = "...");
                renderRoomTranscripts();
                backfillTranslations();
            }
        };
        ui.tgtLang.addEventListener('change', retranslateIfActive);

        function setStatus(text, mode = "idle") {
            ui.status.textContent = text;

        function _dST(code) {
            const c = String(code || "").trim().replace(/_/g, "-");
            const b = baseLang(c);
            if (c === "fil" || c === "tl") return "fil-PH";
            if (b === "en") return c.includes("-") ? c : "en-US";
            if (b === "fr") return c.includes("-") ? c : "fr-FR";
            if (b === "nl") return c.includes("-") ? c : "nl-NL";
            if (b === "de") return c.includes("-") ? c : "de-DE";
            if (b === "es") return c.includes("-") ? c : "es-ES";
            if (b === "pt") return c.includes("-") ? c : "pt-PT";
            if (b === "zh") return c.includes("-") ? c : "zh-CN";
            if (b === "ar") return c.includes("-") ? c : "ar-SA";
            if (b === "he") return "he-IL";
            if (b === "iw") return "he-IL";
            return c || "en-US";
        }

        function _dSE(code) {
            const b = baseLang(code);
            return _vL.has(b) ? b : "";
        }

        function populateLangs() {
            const opts =[`<option value="auto">Auto Detect</option>`];
            for (const[id, label, translate, speech, se] of VARIANTS) {
                opts.push(`<option value="${escapeHtml(id)}" data-translate="${escapeHtml(translate)}" data-speech="${escapeHtml(speech)}" data-se="${escapeHtml(se || "")}">${escapeHtml(label)}</option>`);
            }
            const basePairs = Object.entries(BASE_LANGS).sort((a, b) => a[1].localeCompare(b[1]));
            for (const[code, name] of basePairs) {
                if (!code) continue;
                opts.push(`<option value="${escapeHtml(code)}" data-translate="${escapeHtml(code)}" data-speech="${escapeHtml(_dST(code))}" data-se="${escapeHtml(_dSE(code))}">${escapeHtml(name)} (${escapeHtml(code)})</option>`);
            }
            ui.srcLang.innerHTML = opts.join("");
            ui.tgtLang.innerHTML = opts.slice(1).join("");
            
            ui.srcLang.value = "auto";
            ui.tgtLang.value = "sv";
        }

        function getLangMeta(selectEl) {
            const opt = selectEl.selectedOptions && selectEl.selectedOptions[0];
            const value = selectEl.value || "en-US";
            const translate = (opt && opt.dataset && opt.dataset.translate) ? opt.dataset.translate : value;
            const speech = (opt && opt.dataset && opt.dataset.speech) ? opt.dataset.speech : _dST(value);
            const speechEngine = (opt && opt.dataset && opt.dataset.se) ? opt.dataset.se : _dSE(value);
            return { value, translate, speech, speechEngine };
        }
